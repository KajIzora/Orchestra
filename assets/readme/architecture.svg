<svg xmlns="http://www.w3.org/2000/svg" width="860" height="440" viewBox="0 0 860 440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="server" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4a7dc9"/>
      <stop offset="1" stop-color="#6a5acd"/>
    </linearGradient>
    <linearGradient id="ui" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d9d78"/>
      <stop offset="1" stop-color="#3bb89a"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9aa1ac"/>
    </marker>
  </defs>

  <rect width="860" height="440" rx="16" fill="#f6f7f9"/>
  <text x="40" y="44" font-size="20" font-weight="700" fill="#2c3245">How Orchestra fits together</text>
  <text x="40" y="68" font-size="13" fill="#9aa1ac">Everything runs locally on your Mac. Nothing leaves the machine.</text>

  <!-- LEFT: Signal sources -->
  <text x="40" y="108" font-size="12" font-weight="700" fill="#6b7280" letter-spacing="0.5">SIGNAL SOURCES</text>

  <g font-size="13" fill="#2c3245">
    <rect x="40" y="124" width="220" height="46" rx="10" fill="#ffffff" stroke="#e2e5ea"/>
    <text x="60" y="143" font-weight="600">Agent hooks</text>
    <text x="60" y="160" font-size="11" fill="#6b7280">Claude Code · Codex · Cursor · Gemini</text>

    <rect x="40" y="184" width="220" height="46" rx="10" fill="#ffffff" stroke="#e2e5ea"/>
    <text x="60" y="203" font-weight="600">Chrome extension</text>
    <text x="60" y="220" font-size="11" fill="#6b7280">ChatGPT · Claude · Gemini in browser</text>

    <rect x="40" y="244" width="220" height="46" rx="10" fill="#ffffff" stroke="#e2e5ea"/>
    <text x="60" y="263" font-weight="600">Process watcher</text>
    <text x="60" y="280" font-size="11" fill="#6b7280">Any terminal PID you point it at</text>

    <rect x="40" y="304" width="220" height="46" rx="10" fill="#ffffff" stroke="#e2e5ea"/>
    <text x="60" y="323" font-weight="600">Desktop apps</text>
    <text x="60" y="340" font-size="11" fill="#6b7280">Cursor · Antigravity · Cowork</text>
  </g>

  <!-- arrows to server -->
  <g stroke="#9aa1ac" stroke-width="2" fill="none">
    <path d="M260 147 C 320 147, 340 210, 388 222" marker-end="url(#arrow)"/>
    <path d="M260 207 C 320 207, 345 218, 388 226" marker-end="url(#arrow)"/>
    <path d="M260 267 C 320 267, 345 234, 388 230" marker-end="url(#arrow)"/>
    <path d="M260 327 C 320 327, 345 245, 388 238" marker-end="url(#arrow)"/>
  </g>

  <!-- MIDDLE: local server -->
  <rect x="390" y="190" width="180" height="84" rx="14" fill="url(#server)"/>
  <text x="480" y="226" font-size="16" font-weight="700" fill="#ffffff" text-anchor="middle">Orchestra</text>
  <text x="480" y="247" font-size="12" fill="#dce6f7" text-anchor="middle">local Node server</text>
  <text x="480" y="300" font-size="11" fill="#9aa1ac" text-anchor="middle">127.0.0.1 · JSON on disk</text>

  <!-- arrow server -> UI -->
  <path d="M570 232 H 648" stroke="#9aa1ac" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- RIGHT: UI -->
  <rect x="650" y="190" width="170" height="84" rx="14" fill="url(#ui)"/>
  <text x="735" y="220" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">One view</text>
  <text x="735" y="240" font-size="11" fill="#e0f3ec" text-anchor="middle">browser · desktop</text>
  <text x="735" y="256" font-size="11" fill="#e0f3ec" text-anchor="middle">menu-bar badge</text>

  <text x="650" y="304" font-size="11" fill="#9aa1ac">Every agent, one place.</text>
</svg>
